name: FlowPilot Daily Outreach

on:
  schedule:
    - cron: "0 8 * * 1-5"   # 09:00 norsk tid (08:00 UTC), man–fre
  workflow_dispatch:          # manuell kjøring fra GitHub UI hvis ønskelig

jobs:
  send-outreach:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write         # trenger write for å committe sent_emails.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: outreach/requirements.txt

      - name: Install dependencies
        run: pip install -r outreach/requirements.txt

      - name: Run outreach
        env:
          EMAIL_FLOWPILOT:      ${{ secrets.EMAIL_FLOWPILOT }}
          EMAIL_FLOWPILOT_PASS: ${{ secrets.EMAIL_FLOWPILOT_PASS }}
          EMAIL_SMTP_HOST:      smtp.gmail.com
          EMAIL_SMTP_PORT:      "587"
          GOOGLE_MAPS_API_KEY:  ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: python outreach/cloud_outreach.py

      - name: Save sent emails log
        if: always()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add outreach/sent_emails.json
          git diff --cached --quiet || git commit -m "outreach: oppdater sendt-logg $(date +%Y-%m-%d)"
          git push
